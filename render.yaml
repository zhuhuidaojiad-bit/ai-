# Render Blueprint — Free Tier Deployment (Docker)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-agent
    env: docker
    region: singapore
    plan: free
    envVars:
      # DeepSeek API
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      # Image API (apidot.ai)
      - key: IMAGE_API_KEY
        sync: false
      - key: IMAGE_API_URL
        value: https://api.apidot.ai/api/generate/submit
      - key: IMAGE_MODEL
        value: gpt-image-2
      # Video
      - key: VIDEO_API_KEY
        sync: false
      - key: VIDEO_API_URL
        value: https://api.wuyinkeji.com/api/async/video_package
      - key: DEBUG
        value: "false"
