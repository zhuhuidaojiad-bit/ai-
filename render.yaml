# Render Blueprint — Free Tier Deployment
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: merchant-agents
    env: python
    region: singapore  # 新加坡，对国内访问友好
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      # DeepSeek API
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      # Image API (apidot.ai)
      - key: IMAGE_API_KEY
        sync: false
      - key: IMAGE_API_URL
        value: https://api.apidot.ai/api/generate/submit
      - key: IMAGE_MODEL
        value: gpt-image-2
      # Video
      - key: VIDEO_API_KEY
        sync: false
      - key: VIDEO_API_URL
        value: https://api.wuyinkeji.com/api/async/video_package
      - key: HOST
        value: "0.0.0.0"
      - key: DEBUG
        value: "false"
